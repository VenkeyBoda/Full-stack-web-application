name: Docker Image build and push CI

on:
  push:
    branches: [ 'main']

jobs:

  changes:

    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.filter.outputs.ci }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Filter changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci:
              - 'backend/**'
              - 'database/**'
              - 'frontend/**'
              - 'Dockerfile'

# =========================
# CI JOB
# =========================

  build-and-push:
    needs: changes
    if: needs.changes.outputs.run_ci == 'true'
    
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest


# =========================
# CD JOB
# =========================

  terraform:
    runs-on: ubuntu-latest    
    needs: build-and-push
    if: always()

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: Infra
        run: terraform init

      - name: Terraform Plan
        working-directory: Infra
        run: |
          terraform plan \
              -var-file="terraform.tfvars" \
              -input=false \
              -out=tfplan

      - name: Terraform Apply
        working-directory: Infra
        run: terraform apply -auto-approve tfplan


  deploy-kubernetes:
    runs-on: ubuntu-latest
    needs: terraform
    if: always()

    steps:
      - name: checkout
        uses: actions/checkout@v4
 
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4  

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
          --resource-group ${{ vars.RG_NAME }} \
          --name ${{ vars.AKS_NAME }} \
          --overwrite-existing  

      - name: Wait cluster ready
        run: |
            az aks wait \
            --resource-group ${{ vars.RG_NAME }} \
            --name ${{ vars.AKS_NAME }} \
            --created

      - name: Verify cluster
        run: |
            kubectl cluster-info
            kubectl get nodes

      - name: Install ingress if missing
        run: |
            if ! kubectl get deployment ingress-nginx-controller -n ingress-nginx; then
              kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
            else
              echo "Ingress controller already exists"
            fi
      
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl wait --for=condition=Active namespace/devops-app  --timeout=30s

          kubectl apply -f k8s/postgres-configmap.yaml

          kubectl apply -f k8s/database

          kubectl apply -f k8s/backend
          kubectl apply -f k8s/frontend

          kubectl apply -f k8s/Ingress

