name: Docker Image build and push CI

on:
  push:
    branches: [ 'main']

jobs:

  changes:

    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.filter.outputs.ci }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Filter changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci:
              - 'backend/**'
              - 'database/**'
              - 'frontend/**'
              - 'Dockerfile'  

# =========================
# CI JOB
# =========================

  build-and-push:
    needs: changes
    if: needs.changes.outputs.run_ci == 'true'
    
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest


# =========================
# CD JOB
# =========================

  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Setup kubectl ----------
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # ---------- Install vcluster CLI ----------
      - name: Install vcluster CLI
        run: |
          curl -L -o vcluster "https://github.com/loft-sh/vcluster/releases/latest/download/vcluster-linux-amd64"
          sudo install -c -m 0755 vcluster /usr/local/bin
          rm -f vcluster

      # ---------- Setup kind (host cluster for vcluster) ----------
     # Install a Kind host cluster
      - name: Create Kubernetes kind host cluster
        uses: container-tools/kind-action@v2
        with:
           version: v0.20.0

      - name: Verify kind host cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      # ---------- Create vcluster on kind ----------
      - name: Create vcluster
        run: |
          kubectl create namespace vcluster-ns || true
          vcluster create demo-cluster --namespace vcluster-ns
          vcluster connect demo-cluster --namespace vcluster-ns &

      # ---------- Install ingress if missing ----------
      - name: Install ingress controller
        run: |
          if ! kubectl get deployment ingress-nginx-controller -n ingress-nginx; then
            kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
          else
            echo "Ingress controller already exists"
          fi

      # ---------- Deploy your app ----------
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml

          kubectl apply -f k8s/postgres-configmap.yaml

          kubectl apply -f k8s/database

          kubectl apply -f k8s/backend
          kubectl apply -f k8s/frontend

      - name: Wait for ingress controller
        run: |
            kubectl -n ingress-nginx wait --for=condition=Ready pod -l app.kubernetes.io/component=controller --timeout=120s
      
      - name: Apply Ingress
        run: |  
            kubectl apply -f k8s/Ingress

      - name: Print frontend URL
        run: |
              NODEPORT=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.spec.ports[?(@.port==80)].nodePort}')
              echo "Frontend URL (localhost in runner): http://127.0.0.1:$NODEPORT"
